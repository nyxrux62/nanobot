x-common-build: &common-build
  build:
    context: .
    dockerfile: Dockerfile

x-gateway-base: &gateway-base
  <<: *common-build
  command: ["gateway"]
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: '1'
        memory: 1G
      reservations:
        cpus: '0.25'
        memory: 256M

x-cli-base: &cli-base
  <<: *common-build
  profiles:
    - cli
  stdin_open: true
  tty: true

services:
  # ============================================================
  # Single-instance (default) — same as before, no env vars needed
  # Usage:
  #   nanobot onboard                    # or: docker compose run --rm nanobot-cli onboard
  #   vim ~/.nanobot/config.json
  #   docker compose up -d nanobot-gateway
  # ============================================================
  # nanobot-gateway:
  #   container_name: nanobot-gateway
  #   <<: *gateway-base
  #   volumes:
  #     - ~/.nanobot:/root/.nanobot
  #   ports:
  #     - "18790:18790"

  # nanobot-cli:
  #   container_name: nanobot-cli
  #   <<: *cli-base
  #   volumes:
  #     - ~/.nanobot:/root/.nanobot
  #   command: ["status"]

  # ============================================================
  # Multi-instance example — uncomment and customize per user
  #
  # Each user gets:
  #   - Separate host volume (~/.nanobot-{user})
  #   - Own bot token via NANOBOT_BOT_TOKEN
  #   - Own model/provider via NANOBOT_MODEL / NANOBOT_PROVIDER
  #   - Unique host port (18791, 18792, ...)
  #
  # Config is auto-generated from env vars on first start.
  # Once ~/.nanobot-{user}/config.json exists, env vars are ignored.
  # ============================================================

  nanobot-gateway-lato:
    container_name: nanobot-gateway-lato
    <<: *gateway-base
    volumes:
      - ~/.nanobot-lato:/root/.nanobot
    ports:
      - "18791:18790"
    environment:
      NANOBOT_CHANNEL: telegram
      NANOBOT_BOT_TOKEN: "${LATO_BOT_TOKEN}"
      NANOBOT_ALLOW_FROM: "${LATO_ALLOW_FROM}"
      NANOBOT_PROVIDER: "${LATO_PROVIDER}"
      NANOBOT_MODEL: "${LATO_MODEL}"
      NANOBOT_API_KEY: "${LATO_API_KEY}"
  
  nanobot-cli-lato:
    container_name: nanobot-cli-lato
    <<: *cli-base
    volumes:
      - ~/.nanobot-lato:/root/.nanobot
    command: ["status"]

  # nanobot-gateway-bob:
  #   container_name: nanobot-gateway-bob
  #   <<: *gateway-base
  #   volumes:
  #     - ~/.nanobot-bob:/root/.nanobot
  #   ports:
  #     - "18792:18790"
  #   environment:
  #     NANOBOT_CHANNEL: telegram
  #     NANOBOT_BOT_TOKEN: "your-bob-bot-token"
  #     NANOBOT_ALLOW_FROM: "bob_telegram_id"
  #     NANOBOT_PROVIDER: anthropic
  #     NANOBOT_MODEL: "anthropic/claude-opus-4-5"
  #     NANOBOT_API_KEY: "your-bob-api-key"
  #
  # nanobot-cli-bob:
  #   container_name: nanobot-cli-bob
  #   <<: *cli-base
  #   volumes:
  #     - ~/.nanobot-bob:/root/.nanobot
  #   command: ["status"]
